<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <title>會員中心 - 我的訂單 | GOTO Rent</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.3/jquery.min.js"></script>

    <style>
        body {
            padding-top: 70px;
        }

        .order-card:hover {
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.15);
            cursor: pointer;
            transition: 0.2s;
        }

        .profile-box {
            background: #f8f9fa;
            border-radius: .5rem;
            padding: 1rem 1.25rem;
        }
    </style>
</head>

<body>

    <!-- 🔹 Navbar（跟首頁風格一致） -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
        <div class="container">
            <a class="navbar-brand" href="car-rental.html">GOTO Rent</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" id="homepagebtn">首頁</a></li>
                    <li class="nav-item">
                        <button class="btn btn-outline-light btn-sm ms-lg-3" id="myorderbtn">我的訂單</button>
                    </li>
                    <li class="nav-item">
                        <button class="btn btn-outline-light btn-sm ms-lg-3" id="updatebtn">變更會員資料</button>
                    </li>
                    <li>
                    	<button class="btn btn-outline-light btn-sm ms-lg-3" id="loginout"></button>
					</li>
                    <li class="nav-item">
                        <div id="welcome-message" style="color: yellow"></div>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- ❗登入用 Modal（可以直接沿用你之前的，也可以先放空殼） -->
    <div class="modal fade" id="loginModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">會員登入</h5>
                    <button class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <p class="text-muted mb-0">這裡可以放你之前做好的登入表單。</p>
                </div>
            </div>
        </div>
    </div>

    <!-- 🔹 會員中心頁首 -->
    <div class="container mt-4">
        <div class="row g-3 align-items-center">
            <div class="col-md-8">
                <h2 class="h4 mb-1">會員中心</h2>
                <p class="text-muted mb-0">管理您的個人資料與租車訂單。</p>
            </div>
            <div class="col-md-4">
                <div class="profile-box">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <div class="fw-bold" id="memberName">GOTO 會員</div>
                            <div class="small text-muted" id="memberEmail">member@example.com</div>
                        </div>
                        <span class="badge bg-primary">一般會員</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 🔹 Tabs：目前只用「我的訂單」，之後可再加其它 -->
    <div class="container mt-3">
        <ul class="nav nav-tabs">
            <li class="nav-item">
                <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#tab-orders">
                    我的訂單
                </button>
            </li>
            <!-- 之後可以新增：
        <li class="nav-item"><button class="nav-link" data-bs-toggle="tab" data-bs-target="#tab-profile">會員資料</button></li>
        -->
        </ul>

        <div class="tab-content border border-top-0 p-3">
            <!-- 我的訂單 Tab -->
            <div class="tab-pane fade show active" id="tab-orders">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h3 class="h5 mb-0">訂單列表</h3>
                    <small class="text-muted">點擊「修改日期」或「取消訂單」操作</small>
                </div>

                <div id="order-list" class="row g-3">
                    <!-- JS render -->
                </div>
            </div>

            <!-- 預留：會員資料 Tab
        <div class="tab-pane fade" id="tab-profile">
            ...
        </div>
        -->
        </div>
    </div>

    <!-- 🔹 訂單詳細 Modal -->
    <div class="modal fade" id="orderDetailModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">

                <div class="modal-header">
                    <h5 class="modal-title">訂單詳細資料</h5>
                    <button class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    <p id="detail-car-name" class="fw-bold"></p>
                    <p id="detail-date-range"></p>
                    <p id="detail-price"></p>
                    <p id="detail-status" class="fw-bold"></p>
                    <hr>
                    <p class="small text-muted mb-0">訂單編號：</p>
                    <p id="detail-order-id" class="small"></p>
                </div>

                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">關閉</button>
                </div>

            </div>
        </div>
    </div>

    <!-- 🔹 修改取還車日期 Modal -->
    <div class="modal fade" id="editDateModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">

                <div class="modal-header">
                    <h5 class="modal-title">修改租期</h5>
                    <button class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    <form>
                        <div class="mb-3">
                            <label class="form-label">取車日期</label>
                            <input type="date" class="form-control" id="editPickupDate">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">還車日期</label>
                            <input type="date" class="form-control" id="editReturnDate">
                        </div>
                        <p class="text-muted small mb-0">
                            ※ 此處目前僅為前端修改示意，實務上需呼叫後端 API 驗證可否修改。
                        </p>
                    </form>
                </div>

                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button class="btn btn-primary" id="saveDateBtn">儲存變更（前端示範）</button>
                </div>

            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // =========================
        //   假資料區：之後可用 API 取代
        // =========================
        let sampleOrders = [
            {
                orderId: "A20250101-001",
                carName: "Toyota Vios",
                pickupDate: "2025-01-12",
                returnDate: "2025-01-15",
                price: 3600,
                status: "已完成",
                imageUrl: "https://picsum.photos/seed/vios/400/250"
            },
            {
                orderId: "A20250110-002",
                carName: "Honda Civic",
                pickupDate: "2025-01-20",
                returnDate: "2025-01-23",
                price: 5400,
                status: "已取消",
                imageUrl: "https://picsum.photos/seed/civic/400/250"
            },
            {
                orderId: "A20250118-003",
                carName: "Toyota RAV4",
                pickupDate: "2025-02-02",
                returnDate: "2025-02-04",
                price: 4800,
                status: "進行中",
                imageUrl: "https://picsum.photos/seed/rav4/400/250"
            }
        ];

        let editingOrderId = null;

        // ============ 共用小工具 ============

        function getStatusBadgeClass(status) {
            switch (status) {
                case "已完成": return "bg-success";
                case "已取消": return "bg-secondary";
                case "進行中": return "bg-warning text-dark";
                default: return "bg-light text-dark";
            }
        }

        // ============ 渲染訂單列表 ============

        function renderOrders() {
            const list = document.getElementById("order-list");
            list.innerHTML = "";

            if (!sampleOrders || sampleOrders.length === 0) {
                list.innerHTML = `<p class="text-muted">目前沒有訂單。</p>`;
                return;
            }

            sampleOrders.forEach(order => {
                const col = document.createElement("div");
                col.className = "col-md-6 col-lg-4";

                col.innerHTML = `
            <div class="card order-card h-100">
                <img src="${order.imageUrl}" class="card-img-top" alt="${order.carName}">
                <div class="card-body d-flex flex-column">
                    <h5 class="card-title">${order.carName}</h5>
                    <p class="card-text mb-1">${order.pickupDate} ~ ${order.returnDate}</p>
                    <p class="fw-bold text-primary mb-2">NT$ ${order.price}</p>
                    <span class="badge ${getStatusBadgeClass(order.status)} mb-2">${order.status}</span>

                    <div class="mt-auto d-flex gap-2">
                        <button class="btn btn-sm btn-outline-secondary flex-fill"
                                onclick="openOrderDetail('${order.orderId}')">
                            詳細
                        </button>
                        <button class="btn btn-sm btn-outline-primary flex-fill"
                                onclick="openEditDate('${order.orderId}')"
                                ${order.status !== "進行中" ? "disabled" : ""}>
                            修改日期
                        </button>
                        <button class="btn btn-sm btn-outline-danger flex-fill"
                                onclick="cancelOrder('${order.orderId}')"
                                ${order.status !== "進行中" ? "disabled" : ""}>
                            取消訂單
                        </button>
                    </div>
                </div>
            </div>
        `;

                list.appendChild(col);
            });
        }

        // ============ 訂單詳細 ============

        function openOrderDetail(orderId) {
            const order = sampleOrders.find(o => o.orderId === orderId);
            if (!order) return;

            document.getElementById("detail-car-name").innerText = order.carName;
            document.getElementById("detail-date-range").innerText =
                `${order.pickupDate} ~ ${order.returnDate}`;
            document.getElementById("detail-price").innerText =
                `總金額：NT$ ${order.price}`;
            document.getElementById("detail-status").innerHTML =
                `狀態：<span class="badge ${getStatusBadgeClass(order.status)}">${order.status}</span>`;
            document.getElementById("detail-order-id").innerText = order.orderId;

            new bootstrap.Modal(document.getElementById("orderDetailModal")).show();
        }

        // ============ 修改日期 ============

        function openEditDate(orderId) {
            const order = sampleOrders.find(o => o.orderId === orderId);
            if (!order) return;

            editingOrderId = orderId;
            document.getElementById("editPickupDate").value = order.pickupDate;
            document.getElementById("editReturnDate").value = order.returnDate;

            new bootstrap.Modal(document.getElementById("editDateModal")).show();
        }

        document.getElementById("saveDateBtn").addEventListener("click", function () {
            if (!editingOrderId) return;
            const pickup = document.getElementById("editPickupDate").value;
            const ret = document.getElementById("editReturnDate").value;

            if (!pickup || !ret) {
                alert("請選擇取車與還車日期");
                return;
            }

            const order = sampleOrders.find(o => o.orderId === editingOrderId);
            if (!order) return;

            // 前端直接改資料（示範用）
            order.pickupDate = pickup;
            order.returnDate = ret;

            // 關閉 modal
            const modalEl = document.getElementById("editDateModal");
            const modal = bootstrap.Modal.getInstance(modalEl);
            modal.hide();

            // 重新 render
            renderOrders();

            // 實務上應該改成 call API：
            // fetch(`/api/orders/${editingOrderId}/period`, { method: "PUT", body: JSON.stringify({...}) })
            alert("目前僅為前端示範，實務上需呼叫後端 API 更新訂單。");
        });

        // ============ 取消訂單 ============

        function cancelOrder(orderId) {
            const order = sampleOrders.find(o => o.orderId === orderId);
            if (!order) return;

            if (order.status !== "進行中") {
                alert("只有進行中的訂單可以取消。");
                return;
            }

            if (!confirm(`確定要取消訂單 ${orderId} 嗎？`)) {
                return;
            }

            // 前端直接改狀態（示範用）
            order.status = "已取消";
            renderOrders();

            // 實務上這裡應該是：
            // fetch(`/api/orders/${orderId}/cancel`, { method: "POST" })
        }

        // ============ 初始化 ============

        document.addEventListener("DOMContentLoaded", function () {
            renderOrders();

            // 之後可以把會員資訊從登入後的資料帶進來
            // 例如從 LocalStorage 或 /api/me 取得
            // document.getElementById("memberName").innerText = currentUser.name;
            // document.getElementById("memberEmail").innerText = currentUser.email;
        });
    </script>
	<script src="js/member.js"></script>
</body>

</html>
